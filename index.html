<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Digital</title>

<style>

body{
font-family: Arial;
background: linear-gradient(180deg,#ffc1e6,#ffd9f2);
text-align:center;
margin:0;
}

/* LOGIN */

#login{
margin-top:120px;
}

input{
padding:10px;
border-radius:10px;
border:1px solid #ff69b4;
}

button{
padding:10px 20px;
border:none;
border-radius:12px;
background:#ff4da6;
color:white;
cursor:pointer;
font-weight:bold;
}

h1{
color:#ff2e93;
}

/* MOCHILA */

#mochila{
display:none;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
gap:12px;
max-width:900px;
margin:auto;
}

.pasta{
background:white;
border:2px solid #ff8fcf;
border-radius:15px;
padding:20px;
cursor:pointer;
transition:0.2s;
}

.pasta:hover{
transform:scale(1.05);
background:#ffe6f5;
}

/* AREA DE ANOTAÇÃO */

#editor{
display:none;
margin-top:20px;
}

textarea{
width:80%;
height:200px;
border-radius:12px;
border:2px solid #ff8fcf;
padding:10px;
}

.voltar{
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">
<h1>🎒 Minha Mochila</h1>
<p>Digite a senha:</p>
<input type="password" id="senha">
<br><br>
<button onclick="entrar()">Entrar</button>
<p id="erro" style="color:red;"></p>
</div>

<!-- MOCHILA -->

<div id="mochila">

<h1>📚 Minhas Matérias</h1>

<div class="grid" id="pastas"></div>

<div id="editor">
<h2 id="tituloMateria"></h2>

<textarea id="texto"></textarea>
<br>
<button onclick="salvar()">💾 Salvar</button>
<br>
<button class="voltar" onclick="voltar()">⬅ Voltar</button>

</div>

</div>

<script>

let materiaAtual = "";

/* LOGIN */

function entrar(){
let senha = document.getElementById("senha").value;

if(senha === "1322"){
document.getElementById("login").style.display="none";
document.getElementById("mochila").style.display="block";
}else{
document.getElementById("erro").innerText="Senha errada!";
}
}

/* CRIAR 21 PASTAS */

let container = document.getElementById("pastas");

for(let i=1;i<=21;i++){

let pasta = document.createElement("div");
pasta.className="pasta";
pasta.innerHTML="📁 Matéria "+i;

pasta.onclick=function(){
abrirMateria("materia"+i,"Matéria "+i);
};

container.appendChild(pasta);

}

/* ABRIR MATERIA */

function abrirMateria(id,nome){

materiaAtual=id;

document.getElementById("pastas").style.display="none";
document.getElementById("editor").style.display="block";

document.getElementById("tituloMateria").innerText="📚 "+nome;

let salvo = localStorage.getItem(id);

document.getElementById("texto").value = salvo ? salvo : "";

}

/* SALVAR */

function salvar(){

let texto = document.getElementById("texto").value;

localStorage.setItem(materiaAtual,texto);

alert("Salvo!");

}

/* VOLTAR */

function voltar(){

document.getElementById("editor").style.display="none";
document.getElementById("pastas").style.display="grid";

}

</script>

</body>
</html>
