<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Escolar</title>
<style>
/* ===== Fonte e cores ===== */
body {
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(135deg,#ffcce6,#ff99cc,#ffd6ec,#ffb3d9);
  overflow-x:hidden;
  position:relative;
}

/* ===== Corações e Laços Animados ===== */
.heart, .bow {
  position: fixed;
  font-size: 70px;
  animation: cair 10s linear infinite;
  opacity:0.3;
  z-index:-1;
}

@keyframes cair {
  0% { transform: translateY(-100px); }
  100% { transform: translateY(110vh); }
}

/* ===== Login ===== */
#login {
  margin-top: 100px;
  position: relative;
}

#login img.logo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 50px;
}

h1.cursiva {
  font-family: 'Brush Script MT', cursive;
  font-size:50px;
  margin:5px;
  color:#b30059;
}

h2, h3 { color:#b30059; }

.nome {
  font-size:22px;
  font-weight:bold;
  color:#99004d;
  margin:10px;
}

input[type=password] {
  padding:10px;
  border-radius:10px;
  border:1px solid #ff80bf;
  margin:10px;
  font-size:16px;
}

#app { display:none; padding:20px; position: relative; }

/* ===== Logo da Rose Quartz ===== */
#app img.rose {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 150px;
}

/* ===== Matérias estilo caderno ===== */
.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  margin-top:20px;
}

.materia {
  background:#fff0f7;
  border-radius:15px;
  border:2px solid #ffb3d9;
  padding:0;
  max-height:60px; /* fechado inicialmente */
  overflow:hidden;
  transition: max-height 0.5s ease;
  cursor:pointer;
}

.materia.open { max-height:400px; } /* aberto */

.materia-header {
  padding:10px;
  font-weight:bold;
  color:#99004d;
  background:#ffb3d9;
}

.materia textarea { 
  width:90%; 
  height:200px; 
  margin:10px auto; 
  display:block; 
}

/* ===== Tabela de horário ===== */
.tabela {
  margin:auto;
  background:white;
  border-radius:15px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
  margin-top:40px;
}

table { border-collapse:collapse; margin:auto; }
th,td { border:1px solid #ff99cc; padding:6px; }
th { background:#ffb3d9; }
td input {
  width:90px;
  border:none;
  text-align:center;
  background:#fff5fa;
}

/* ===== Letras cursivas ===== */
.cursiva-pequena {
  font-family: 'Brush Script MT', cursive;
  font-size:30px;
  color:#b30059;
}

/* ===== Botão ===== */
button {
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
}

button:hover { background:#e60073; }

</style>
</head>
<body>

<!-- ===== Corações e laços no fundo ===== -->
<div class="heart" style="left:10%">💖</div>
<div class="heart" style="left:25%">💗</div>
<div class="heart" style="left:40%">💕</div>
<div class="heart" style="left:55%">💞</div>
<div class="heart" style="left:70%">💘</div>
<div class="bow" style="left:15%">🎀</div>
<div class="bow" style="left:35%">🎀</div>
<div class="bow" style="left:60%">🎀</div>
<div class="bow" style="left:80%">🎀</div>

<!-- ===== Tela de Login ===== -->
<div id="login">
  <img class="logo" src="https://via.placeholder.com/50x50.png?text=ECM" alt="Logo da Escola">
  <h1 class="cursiva">MOCHILA</h1>
  <div class="nome">CAMILLY EMANUELA DOS SANTOS FARIA</div>
  <input type="password" id="senha" placeholder="Digite a senha" oninput="entrarAuto()">
</div>

<!-- ===== Tela Principal ===== -->
<div id="app">
  <img class="rose" src="https://upload.wikimedia.org/wikipedia/en/2/2c/Rose_Quartz_Steven_Universe.png" alt="Rose Quartz">
  <h1 class="cursiva">MOCHILA</h1>
  <div class="nome">CAMILLY EMANUELA DOS SANTOS FARIA</div>

  <h2>📚 Minhas Matérias</h2>
  <div class="container" id="materias"></div>

  <h2>🗓 Horário Escolar</h2>
  <div class="tabela">
    <table>
      <tr>
        <th>Aula</th><th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th>
      </tr>
      <tbody id="horario"></tbody>
    </table>
  </div>
</div>

<script>
const senhaCorreta = "1322";

/* ===== Login automático ===== */
function entrarAuto() {
  let senha = document.getElementById("senha").value.trim();
  if (senha === senhaCorreta) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    carregarMaterias();
    carregarHorario();
    ativarCaderno();
  }
}

/* ===== Matérias estilo caderno ===== */
function carregarMaterias() {
  const container = document.getElementById("materias");
  container.innerHTML = "";
  for(let i=1;i<=24;i++){
    let nome = localStorage.getItem("nome"+i) || "Matéria "+i;
    let texto = localStorage.getItem("texto"+i) || "";
    container.innerHTML += `
      <div class="materia">
        <div class="materia-header">${nome}</div>
        <textarea placeholder="Anotações">${texto}</textarea>
      </div>
    `;
  }
}

/* Salvar nomes e textos */
function salvarNome(i,v){ localStorage.setItem("nome"+i,v);}
function salvarTexto(i,v){ localStorage.setItem("texto"+i,v);}

/* Abrir caderno ao clicar */
function ativarCaderno(){
  document.querySelectorAll('.materia').forEach((div,i)=>{
    const header = div.querySelector('.materia-header');
    const textarea = div.querySelector('textarea');
    textarea.addEventListener('input',()=>salvarTexto(i+1,textarea.value));
    header.addEventListener('click', ()=>{
      div.classList.toggle('open');
    });
  });
}

/* ===== Horário Escolar ===== */
function carregarHorario(){
  const tabela = document.getElementById("horario");
  tabela.innerHTML = "";
  for(let i=1;i<=9;i++){
    let linha = "<tr><th>"+i+"</th>";
    for(let d=1;d<=5;d++){
      let id = "h"+i+"_"+d;
      let valor = localStorage.getItem(id)||"";
      linha += `<td><input value="${valor}" onkeyup="salvarHorario('${id}',this.value)"></td>`;
    }
    linha += "</tr>";
    tabela.innerHTML += linha;
  }
}

function salvarHorario(id,valor){ localStorage.setItem(id,valor);}
</script>
</body>
</html>
